<!-- M25 Lesson 3 – Text styling properties -->
<!-- Short Description: Various text properties like font, color, alignment, decoration etc. -->
<!DOCTYPE html>
<html>
<head>
  <title>My Superhero Card</title>
  <style>

    /* Typography — font, size, weight, colour for the whole page */
    body {
      background-color: darkblue;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* Typography + Text Shadow — big bold title with an orange shadow */
    .hero-name {
      font-size: 60px;
      font-weight: bold;
      color: yellow;
      text-shadow: 3px 3px orange;
    }

    /* Typography + Text Transform — tagline becomes Title Case */
    .tagline {
      font-style: italic;
      color: lightblue;
      text-transform: capitalize;
    }

    /* Text Transform + Text Decoration — section headings in CAPS with underline */
    .label {
      text-transform: uppercase;
      text-decoration: underline;
      color: coral;
    }

    /* Typography — powers stand out in bold green */
    .power {
      font-weight: bold;
      color: lightgreen;
    }

    /* Text Decoration — weaknesses are crossed out */
    .weakness {
      text-decoration: line-through;
      color: gray;
    }

    /* Transform — the badge is tilted to the side */
    .badge {
      font-size: 28px;
      font-weight: bold;
      color: gold;
      transform: rotate(15deg);
    }

    /* Typography — footer text */
    .made-by {
      color: coral;
      font-style: italic;
    }

  </style>
</head>
<body>

  <h1 class="hero-name">Thunder Kid</h1>
  <p class="tagline">the most powerful hero in the school</p>

  <h2 class="label">super powers</h2>
  <p class="power">Can run faster than a cheetah</p>
  <p class="power">Can lift a school bus</p>

  <h2 class="label">weaknesses</h2>
  <p class="weakness">Maths homework</p>
  <p class="weakness">Broccoli</p>

  <p class="badge">Top Hero</p>

  <p class="made-by">Created by ___________</p>

</body>
</html>
<!-- Activity 1 -->
<!-- Goal: Apply font-family, font-size, font-weight. -->
<!-- Summary: Create different text styles using font properties. -->
<h1 style="font-family: 'Arial'; font-size: 32px; font-weight: bold;">Styled Heading</h1>

<!-- Activity 2 -->
<!-- Goal: Text alignment, line-height, letter-spacing. -->
<!-- Summary: Improve readability with alignment and spacing. -->
<p style="text-align: justify; line-height: 1.6; letter-spacing: 1px;">This paragraph demonstrates text styling properties.</p>

<!-- Activity 3 -->
<!-- Goal: Text decoration, transform, shadow. -->
<!-- Summary: Add underline, uppercase and text shadows. -->
<p style="text-decoration: underline; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Decorated Text</p>
