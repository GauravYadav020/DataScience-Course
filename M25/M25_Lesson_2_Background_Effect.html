<!-- M25 Lesson 2 – Background Effect -->
<!-- Short Description: Working with background colors, images, gradients and effects. -->
<!DOCTYPE html>
<html>
<head>
  <title>My Space Page</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-header">
    <h1>My Space Page</h1>
    <p>Welcome to my corner of the galaxy!</p>
  </div>

  <div class="fact-card">
    <h2>Fun Space Fact</h2>
    <p>The Sun is so big that one million Earths could fit inside it.</p>
  </div>

  <div class="star"></div>

  <p class="footer-text">Made by ___________</p>

</body>
</html>
<!-- Activity 1 -->
<!-- Goal: Set background color and image. -->
<!-- Summary: Apply solid color and background image to body and divs. -->
<body style="background-color: #f0f0f0; background-image: url('background.jpg');">

<!-- Activity 2 -->
<!-- Goal: Create linear and radial gradients. -->
<!-- Summary: Use CSS gradients for modern backgrounds. -->
<div style="background: linear-gradient(to right, blue, white); height: 200px;"></div>

<!-- Activity 3 -->
<!-- Goal: Background properties like repeat, position, attachment. -->
<!-- Summary: Experiment with different background positioning. -->
<div style="background: url('image.jpg') no-repeat center center; background-size: cover;"></div>
