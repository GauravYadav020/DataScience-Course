<!-- M25 Lesson 1 – Introduction to CSS -->
<!-- Short Description: Introduction to Cascading Style Sheets, how it works with HTML, and basic syntax. -->

<!-- Activity 1 -->
<!-- Goal: Understand the basic syntax and ways to add CSS (inline, internal, external). -->
<!-- Summary: Students will create a simple HTML page and apply CSS using all three methods. -->
<!DOCTYPE html>
<html>
<head>
    <title>Activity 1</title>
    <style>
        body { background-color: lightblue; }
    </style>
</head>
<body>
    <h1 style="color: navy;">Hello CSS!</h1>
    <p>This is internal CSS.</p>
</body>
</html>

<!-- Activity 2 -->
<!-- Goal: Learn CSS selectors (element, class, id). -->
<!-- Summary: Apply different selectors to style multiple elements differently. -->
<h1>Selector Example</h1>
<p class="highlight">This is class selector</p>
<p id="special">This is ID selector</p>

<!-- Activity 3 -->
<!-- Goal: Apply colors, fonts, and basic text styling. -->
<!-- Summary: Create a colorful paragraph with custom font family. -->
<p style="color: green; font-family: Arial; font-size: 18px;">Styled with inline CSS</p>
