<!-- M24 Lesson 5 – Semantic Elements in HTML -->
<!-- Short Description: Using semantic HTML5 elements for better structure and SEO. -->

<!-- Activity 1 -->
<!-- Goal: Use header, footer, nav, article. -->
<!-- Summary: Build a semantic webpage layout. -->
<header><h1>Website Header</h1></header>
<nav><a href="#">Home</a></nav>
<article><h2>Article Title</h2><p>Content...</p></article>
<footer>Footer Text</footer>

<!-- Activity 2 -->
<!-- Goal: Use section and aside elements. -->
<!-- Summary: Organize content meaningfully. -->
<section><h2>Main Section</h2></section>
<aside><p>Sidebar content</p></aside>

<!-- Activity 3 -->
<!-- Goal: Convert a non-semantic page to semantic. -->
<!-- Summary: Improve accessibility and structure. -->
